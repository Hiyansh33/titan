<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>TITAN CORE — RESTRICTED</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --bg: #020408;
  --a: #ff2d78;
  --ar: 255,45,120;
  --a2: #00ffe5;
  --a2r: 0,255,229;
  --font-mono: 'Share Tech Mono', monospace;
  --font-display: 'Orbitron', sans-serif;
  --radius: 12px;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; background:var(--bg); font-family:var(--font-mono); color:var(--a); overflow:hidden; }

canvas#bg { position:fixed; inset:0; z-index:0; pointer-events:none; }
body::after {
  content:''; position:fixed; inset:0; z-index:1; pointer-events:none;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.1) 2px,rgba(0,0,0,0.1) 4px);
}

#app {
  position:relative; z-index:5;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100vh; padding:20px;
}

/* ── PIN SCREEN ── */
#pinScreen {
  width:100%; max-width:400px;
  display:flex; flex-direction:column; align-items:center; gap:24px;
}

.lock-icon {
  width:70px; height:70px; border-radius:50%;
  border:2px solid var(--a); display:flex; align-items:center; justify-content:center;
  font-size:28px; background:rgba(255,45,120,0.06);
  box-shadow: 0 0 20px rgba(var(--ar),0.2);
  animation: lockPulse 2s ease-in-out infinite;
}
@keyframes lockPulse { 0%,100%{box-shadow:0 0 20px rgba(var(--ar),0.2)} 50%{box-shadow:0 0 40px rgba(var(--ar),0.5)} }

.pin-title {
  font-family:var(--font-display); font-size:16px; font-weight:900;
  letter-spacing:4px; text-transform:uppercase; color:var(--a);
  text-align:center;
}
.pin-sub { font-size:11px; color:rgba(255,45,120,0.4); letter-spacing:2px; text-align:center; }

/* PIN dots */
.pin-dots { display:flex; gap:14px; }
.pin-dot {
  width:14px; height:14px; border-radius:50%;
  border:2px solid rgba(255,45,120,0.3);
  transition:all 0.15s;
}
.pin-dot.filled { background:var(--a); border-color:var(--a); box-shadow:0 0 10px rgba(var(--ar),0.6); }
.pin-dot.error  { background:#ff4444; border-color:#ff4444; animation:shake 0.4s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

/* Keypad */
.keypad {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:240px;
}
.key {
  height:56px; background:rgba(255,45,120,0.05);
  border:1px solid rgba(255,45,120,0.15); border-radius:10px;
  font-family:var(--font-display); font-size:16px; font-weight:700;
  color:var(--a); cursor:pointer; transition:all 0.15s;
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden; user-select:none;
}
.key:hover { background:rgba(255,45,120,0.12); border-color:rgba(255,45,120,0.4); }
.key:active { transform:scale(0.94); background:rgba(255,45,120,0.2); }
.key.zero { grid-column:2; }
.key.del  { border-color:rgba(0,255,229,0.15); color:var(--a2); }
.key.del:hover { background:rgba(0,255,229,0.1); border-color:rgba(0,255,229,0.3); }

/* Attempts warning */
#attemptsWarn {
  font-size:11px; color:#ff4444; letter-spacing:1px; min-height:16px;
  text-align:center;
}

/* ── ADMIN PANEL ── */
#adminPanel {
  display:none; width:100%; max-width:620px; max-height:90vh;
  border:1px solid rgba(255,45,120,0.25); border-radius:var(--radius);
  background:rgba(2,4,8,0.9); overflow:hidden;
  box-shadow:0 0 60px rgba(255,45,120,0.08);
  flex-direction:column;
}

#adminHeader {
  padding:14px 18px; background:rgba(255,45,120,0.06);
  border-bottom:1px solid rgba(255,45,120,0.15);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
#adminHeader h1 {
  font-family:var(--font-display); font-size:13px; font-weight:900;
  letter-spacing:3px; color:var(--a); text-transform:uppercase;
}
.logout-btn {
  background:none; border:1px solid rgba(0,255,229,0.2);
  color:var(--a2); padding:5px 12px; border-radius:6px;
  cursor:pointer; font-family:var(--font-display); font-size:9px; letter-spacing:1px;
  transition:all 0.2s;
}
.logout-btn:hover { background:rgba(0,255,229,0.1); }

#adminBody { padding:18px; overflow-y:auto; display:flex; flex-direction:column; gap:16px; }

.section {
  padding:16px; border:1px solid rgba(255,45,120,0.1);
  border-radius:10px; background:rgba(255,45,120,0.02);
}
.section h3 {
  font-family:var(--font-display); font-size:10px; letter-spacing:2px;
  color:rgba(255,45,120,0.5); text-transform:uppercase; margin-bottom:12px;
}
.row { display:flex; gap:8px; margin-bottom:8px; }
.inp {
  flex:1; background:rgba(255,45,120,0.05); border:1px solid rgba(255,45,120,0.2);
  color:var(--a); padding:9px 12px; border-radius:8px;
  font-family:var(--font-mono); font-size:13px; outline:none;
}
.inp:focus { border-color:rgba(255,45,120,0.5); }
select.inp option { background:#050a0f; }
textarea.inp { resize:vertical; min-height:80px; line-height:1.5; width:100%; }
.btn {
  background:rgba(255,45,120,0.08); border:1px solid rgba(255,45,120,0.25);
  color:var(--a); padding:9px 16px; border-radius:8px; cursor:pointer;
  font-family:var(--font-display); font-size:9px; letter-spacing:1.5px;
  text-transform:uppercase; white-space:nowrap; transition:all 0.2s;
}
.btn:hover { background:rgba(255,45,120,0.18); }
.btn.cyan { border-color:rgba(0,255,229,0.25); color:var(--a2); }
.btn.cyan:hover { background:rgba(0,255,229,0.1); }
.btn.on { background:var(--a)!important; color:#000!important; border-color:var(--a)!important; }
.status { font-size:11px; color:rgba(255,45,120,0.4); min-height:16px; margin-top:6px; transition:color 0.3s; }
.status.ok  { color:#39ff88; }
.status.err { color:#ff4444; }

/* Live feed */
#liveFeed {
  background:rgba(0,0,0,0.4); border:1px solid rgba(255,45,120,0.1);
  border-radius:8px; padding:10px 12px; max-height:120px; overflow-y:auto;
  font-size:12px; line-height:1.8; color:rgba(255,45,120,0.6);
  scrollbar-width:thin; scrollbar-color:rgba(255,45,120,0.2) transparent;
}
#liveFeed .feed-item { border-bottom:1px solid rgba(255,45,120,0.06); padding:2px 0; }

@media (max-width:600px) {
  #adminPanel { max-height:95vh; }
  #adminHeader h1 { font-size:11px; }
  .btn { font-size:8px; padding:8px 10px; }
  .keypad { width:210px; gap:8px; }
  .key { height:50px; font-size:14px; }
}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<!-- PIN SCREEN -->
<div id="app">
<div id="pinScreen">
  <div class="lock-icon">🔐</div>
  <div class="pin-title">TITAN CORE ACCESS</div>
  <div class="pin-sub">RESTRICTED — AUTHORISED PERSONNEL ONLY</div>

  <input id="pinInput" type="password" placeholder="Enter PIN..." autocomplete="off"
    style="background:rgba(255,45,120,0.05);border:1px solid rgba(255,45,120,0.2);color:var(--a);
    padding:14px 18px;border-radius:10px;font-family:var(--font-mono);font-size:18px;
    outline:none;width:100%;text-align:center;letter-spacing:4px;caret-color:var(--a);">
  <button onclick="checkPin()" style="width:100%;background:rgba(255,45,120,0.08);
    border:1px solid rgba(255,45,120,0.25);color:var(--a);padding:13px;border-radius:10px;
    cursor:pointer;font-family:var(--font-display);font-size:11px;letter-spacing:3px;
    text-transform:uppercase;transition:all 0.2s;">UNLOCK ▸</button>
  <div id="attemptsWarn"></div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div id="adminHeader">
    <h1>⬡ TITAN ADMIN CORE</h1>
    <button class="logout-btn" onclick="logout()">LOCK ▸</button>
  </div>
  <div id="adminBody">

    <div class="section">
      <h3>📢 Broadcast to All Users</h3>
      <div class="row">
        <input class="inp" id="broadcastInput" type="text" placeholder="Message for all users...">
        <button class="btn" onclick="doBroadcast()">SEND</button>
      </div>
      <div class="status" id="broadcastStatus"></div>
    </div>

    <div class="section">
      <h3>🔒 Force Mood (All Users)</h3>
      <div class="row">
        <select class="inp" id="forceMoodSel">
          <option value="">— no force —</option>
          <option value="cold">COLD</option>
          <option value="rage">RAGE</option>
          <option value="ghost">GHOST</option>
          <option value="sarcasm">SARCASM</option>
          <option value="warmth">WARMTH</option>
          <option value="chaos">CHAOS</option>
          <option value="sigma">SIGMA</option>
          <option value="brainrot">BRAINROT</option>
          <option value="villain">VILLAIN</option>
        </select>
        <button class="btn" onclick="doForceMood()">FORCE</button>
        <button class="btn cyan" onclick="doClearForce()">CLEAR</button>
      </div>
      <div class="status" id="forceMoodStatus"></div>
    </div>

    <div class="section">
      <h3>🔓 Secret Moods</h3>
      <div class="row">
        <button class="btn" id="secretBtn" onclick="doToggleSecret()">UNLOCK FOR ALL</button>
      </div>
      <div class="status" id="secretStatus"></div>
    </div>

    <div class="section">
      <h3>⚙️ Edit Mood Prompt Live</h3>
      <div class="row">
        <select class="inp" id="editMoodSel" onchange="loadPrompt()">
          <option value="cold">COLD</option>
          <option value="rage">RAGE</option>
          <option value="ghost">GHOST</option>
          <option value="sarcasm">SARCASM</option>
          <option value="warmth">WARMTH</option>
          <option value="chaos">CHAOS</option>
          <option value="sigma">SIGMA</option>
          <option value="brainrot">BRAINROT</option>
          <option value="villain">VILLAIN</option>
        </select>
      </div>
      <textarea class="inp" id="promptTA" placeholder="Loading..."></textarea>
      <div class="row" style="margin-top:8px">
        <button class="btn" onclick="savePrompt()">SAVE</button>
        <button class="btn cyan" onclick="resetPrompt()">RESET DEFAULT</button>
      </div>
      <div class="status" id="promptStatus"></div>
    </div>

    <div class="section">
      <h3>📡 Live Activity Feed</h3>
      <div id="liveFeed"><div class="feed-item" style="color:rgba(255,45,120,0.3)">Waiting for activity...</div></div>
    </div>

  </div>
</div>
</div>

<script>
const BASE = 'https://titan-ezhg.onrender.com';
const ADMIN_PASS = '8915@JaiMataDi';

// ── PIN SYSTEM ─────────────────────────────────────────────────
let pin = [];
let attempts = 0;
const MAX_ATTEMPTS = 5;
let locked = false;
let secretUnlocked = false;

function checkPin() {
  if(locked) return;
  const entered = document.getElementById("pinInput").value;
  if(entered === ADMIN_PASS) {
    // Success
    document.getElementById("pinInput").style.borderColor="#39ff88";
    setTimeout(() => {
      document.getElementById("pinScreen").style.display="none";
      const panel = document.getElementById("adminPanel");
      panel.style.display="flex";
      loadPrompt();
      loadCurrentState();
      startFeed();
    }, 400);
  } else {
    attempts++;
    document.getElementById("pinInput").style.borderColor="#ff4444";
    setTimeout(() => { document.getElementById("pinInput").value=""; document.getElementById("pinInput").style.borderColor="rgba(255,45,120,0.2)"; }, 600);
    const warn = document.getElementById("attemptsWarn");
    if(attempts >= MAX_ATTEMPTS) {
      locked = true;
      warn.textContent = "⛔ TOO MANY ATTEMPTS — LOCKED FOR 60s";
      setTimeout(() => { locked=false; attempts=0; warn.textContent=""; }, 60000);
    } else {
      warn.textContent = `✕ Wrong PIN — ${MAX_ATTEMPTS-attempts} attempts left`;
    }
  }
}

// Keyboard support
document.getElementById("pinInput").addEventListener("keydown", e => {
  if(e.key === "Enter") checkPin();
});

// ── ADMIN FUNCTIONS ───────────────────────────────────────────
function setStatus(id, msg, ok) {
  const el=document.getElementById(id);
  el.textContent=msg; el.className="status "+(ok?"ok":"err");
  setTimeout(()=>{ el.textContent=""; el.className="status"; },3000);
}

async function doBroadcast() {
  const text=document.getElementById("broadcastInput").value.trim();
  if(!text) return;
  try {
    const r=await fetch(`${BASE}/api/admin/broadcast`,{
      method:"POST",headers:{"Content-Type":"application/json","x-admin-password":ADMIN_PASS},
      body:JSON.stringify({text})
    });
    const d=await r.json();
    setStatus("broadcastStatus", d.ok?"✓ Broadcast sent":"✕ Failed", d.ok);
    if(d.ok) { document.getElementById("broadcastInput").value=""; addFeed("📢 Broadcast: "+text); }
  } catch(e){ setStatus("broadcastStatus","✕ Error",false); }
}

async function doForceMood() {
  const mood=document.getElementById("forceMoodSel").value;
  try {
    const r=await fetch(`${BASE}/api/admin/forcemood`,{
      method:"POST",headers:{"Content-Type":"application/json","x-admin-password":ADMIN_PASS},
      body:JSON.stringify({mood})
    });
    const d=await r.json();
    setStatus("forceMoodStatus",d.ok?`✓ Forced: ${mood||"cleared"}`:"✕ Failed",d.ok);
    if(d.ok) addFeed(`🔒 Mood forced: ${mood||"cleared"}`);
  } catch(e){ setStatus("forceMoodStatus","✕ Error",false); }
}

function doClearForce() {
  document.getElementById("forceMoodSel").value="";
  doForceMood();
}

async function doToggleSecret() {
  try {
    const r=await fetch(`${BASE}/api/admin/secretmoods`,{
      method:"POST",headers:{"Content-Type":"application/json","x-admin-password":ADMIN_PASS},
      body:JSON.stringify({unlocked:!secretUnlocked})
    });
    const d=await r.json();
    if(d.ok){
      secretUnlocked=d.secretMoodsUnlocked;
      const btn=document.getElementById("secretBtn");
      btn.textContent=secretUnlocked?"🔓 LOCK SECRET MOODS":"UNLOCK FOR ALL";
      btn.classList.toggle("on",secretUnlocked);
      setStatus("secretStatus",secretUnlocked?"✓ Secret moods unlocked":"✓ Secret moods hidden",true);
      addFeed(`🔓 Secret moods: ${secretUnlocked?"unlocked":"locked"}`);
    }
  } catch(e){ setStatus("secretStatus","✕ Error",false); }
}

async function loadPrompt() {
  const mood=document.getElementById("editMoodSel").value;
  const ta=document.getElementById("promptTA");
  ta.value="Loading...";
  try {
    const r=await fetch(`${BASE}/api/admin/prompts`,{headers:{"x-admin-password":ADMIN_PASS}});
    const d=await r.json();
    ta.value=d[mood]?.custom||d[mood]?.default||"";
  } catch(e){ ta.value="Error loading"; }
}

async function savePrompt() {
  const mood=document.getElementById("editMoodSel").value;
  const prompt=document.getElementById("promptTA").value.trim();
  try {
    const r=await fetch(`${BASE}/api/admin/editprompt`,{
      method:"POST",headers:{"Content-Type":"application/json","x-admin-password":ADMIN_PASS},
      body:JSON.stringify({mood,prompt})
    });
    const d=await r.json();
    setStatus("promptStatus",d.ok?"✓ Saved — active immediately":"✕ Failed",d.ok);
    if(d.ok) addFeed(`⚙️ Prompt updated: ${mood.toUpperCase()}`);
  } catch(e){ setStatus("promptStatus","✕ Error",false); }
}

async function resetPrompt() {
  const mood=document.getElementById("editMoodSel").value;
  try {
    await fetch(`${BASE}/api/admin/editprompt`,{
      method:"POST",headers:{"Content-Type":"application/json","x-admin-password":ADMIN_PASS},
      body:JSON.stringify({mood,prompt:''})
    });
    setStatus("promptStatus","✓ Reset to default",true);
    loadPrompt();
    addFeed(`♻️ Prompt reset: ${mood.toUpperCase()}`);
  } catch(e){ setStatus("promptStatus","✕ Error",false); }
}

async function loadCurrentState() {
  try {
    const r=await fetch(`${BASE}/api/state`);
    const d=await r.json();
    if(d.forcedMood) document.getElementById("forceMoodSel").value=d.forcedMood;
    secretUnlocked=d.secretMoodsUnlocked;
    const btn=document.getElementById("secretBtn");
    btn.textContent=secretUnlocked?"🔓 LOCK SECRET MOODS":"UNLOCK FOR ALL";
    btn.classList.toggle("on",secretUnlocked);
  } catch(e){}
}

// Live feed
function addFeed(text) {
  const feed=document.getElementById("liveFeed");
  const item=document.createElement("div");
  item.className="feed-item";
  const t=new Date().toTimeString().slice(0,8);
  item.textContent=`[${t}] ${text}`;
  feed.insertBefore(item,feed.firstChild);
  // Keep max 20 items
  while(feed.children.length>20) feed.removeChild(feed.lastChild);
}

let feedInterval;
function startFeed() {
  feedInterval=setInterval(async()=>{
    try {
      const r=await fetch(`${BASE}/api/state`);
      const d=await r.json();
      if(d.forcedMood!==undefined){
        document.getElementById("forceMoodSel").value=d.forcedMood||"";
      }
    } catch(e){}
  },5000);
}

function logout() {
  clearInterval(feedInterval);
  attempts=0;
  locked=false;
  document.getElementById("pinInput").value="";
  document.getElementById("adminPanel").style.display="none";
  document.getElementById("pinScreen").style.display="flex";
}

// ── Background ────────────────────────────────────────────────
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
let w,h,pts=[];
function initBg(){
  w=canvas.width=window.innerWidth;
  h=canvas.height=window.innerHeight;
  pts=Array.from({length:40},()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.2+.4}));
}
function drawBg(){
  ctx.fillStyle="rgba(2,4,8,0.04)";ctx.fillRect(0,0,w,h);
  for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
    const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<130){ctx.strokeStyle=`rgba(255,45,120,${(1-dist/130)*.12})`;ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}
  }
  ctx.fillStyle="rgba(255,45,120,0.5)";
  pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();});
  requestAnimationFrame(drawBg);
}
window.onresize=initBg;initBg();drawBg();
</script>
</body>
</html>
